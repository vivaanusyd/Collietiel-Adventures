# Netlify build config, kept in the repo rather than only in Netlify's
# dashboard — so the build is reproducible and you can see what it does
# without logging in.
#
# Netlify would auto-detect most of this for an Astro project. The one thing
# genuinely worth pinning is NODE_VERSION: hosts move their default Node
# forward on their own schedule, and a build that worked last month failing
# for no visible reason is almost always that.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# The GitHub OAuth handshake for the CMS at /admin/. Netlify auto-detects
# this directory, but it's written down so the functions are discoverable
# from the config rather than only by finding the folder.
#
# Each function declares its own route via `export const config = { path }`
# (Netlify Functions v2), so there are no redirect rules to keep in step:
#   netlify/functions/auth.mjs     -> /api/auth
#   netlify/functions/callback.mjs -> /api/callback
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# TWO ENVIRONMENT VARIABLES MUST BE SET IN THE NETLIFY DASHBOARD, not here:
#
#   GITHUB_OAUTH_ID       the OAuth app's client ID
#   GITHUB_OAUTH_SECRET   the OAuth app's client secret
#
# They are deliberately absent from this file and from the repository. A
# client secret in Git is a client secret published — the repo is readable,
# and Git remembers it even after a later commit removes it. Set them at
# Site configuration -> Environment variables; see docs/SETUP-CHECKLIST.md
# for the full walkthrough.

# dist/404.html is picked up automatically for unmatched routes — no redirect
# rule needed. See src/pages/404.astro.

# NOT setting long cache headers on /icons/* and /images/* on purpose.
# Files in public/ aren't content-hashed, so an aggressive max-age means
# overwriting an icon leaves readers on the old art until their cache
# expires. Once the art is final and you've stopped iterating, adding
# something like this is worth it:
#
# [[headers]]
#   for = "/icons/*"
#   [headers.values]
#     Cache-Control = "public, max-age=604800"
